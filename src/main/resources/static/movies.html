<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movies | Movie Ticket Booking</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <h1 class="logo">Movie Ticket Booking</h1>

            <nav class="nav">
                <a href="/index.html">Home</a>
                <a href="/movies.html">Movies</a>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="container">

        <!-- Tiêu đề trang -->
        <section class="page-title">
            <h2>Movies</h2>
            <p>
                This page loads movie data from the Spring Boot backend API.
            </p>
        </section>

        <!-- Loading state -->
        <div id="loadingMessage" class="message">
            Loading movies...
        </div>

        <!-- Error state -->
        <div id="errorMessage" class="message error hidden">
        </div>

        <!-- Empty state -->
        <div id="emptyMessage" class="message hidden">
            No movies found.
        </div>

        <!-- Nơi JavaScript render danh sách phim -->
        <section id="movieList" class="movie-grid">
            <!-- Movie cards will be rendered here by movies.js -->
        </section>

    </main>

    <!-- Link JavaScript. Đặt cuối body để HTML load xong trước -->
    <script src="/js/movies.js"></script>
</body>
</html>
