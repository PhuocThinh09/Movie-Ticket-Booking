<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Giúp trang hiển thị tốt trên nhiều kích thước màn hình -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Movie List</title>

    <!-- Link tới file CSS -->
    <link rel="stylesheet" href="/css/movies.css">
</head>
<body>
    <header class="page-header">
        <div>
            <h1>Movie Ticket Booking</h1>
            <p>Browse available movies from the backend database</p>
        </div>
    </header>

    <main class="container">
        <section class="toolbar">
            <div>
                <h2>Available Movies</h2>
                <p id="movie-count">Loading movies...</p>
            </div>

            <button id="reload-btn" class="btn">
                Reload
            </button>
        </section>

        <!-- Khu vực hiển thị thông báo loading/error -->
        <div id="message" class="message">
            Loading movies...
        </div>

        <!-- Khu vực render danh sách phim -->
        <section id="movie-list" class="movie-grid">
            <!-- JavaScript sẽ render movie card vào đây -->
        </section>
    </main>

    <!-- Link tới file JavaScript -->
    <script src="/js/movies.js"></script>
</body>
</html>
